spring.application.name=ShareYourStory

# JPA and MYSQL connection
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Datasource: credenciales externalizadas (ver db/02-usuarios-permisos.sql).
# La aplicacion usa 'app_rw' (minimo privilegio), NO 'root'.
# En produccion: definir DB_USERNAME / DB_PASSWORD por variable de entorno.
spring.datasource.url=${DB_URL:jdbc:mysql://mysql:3306/shareYourStory}
spring.datasource.username=${DB_USERNAME:app_rw}
spring.datasource.password=${DB_PASSWORD:app_rw_pwd}


# JWT
# El secreto se lee de la variable de entorno JWT_SECRET. El valor por defecto
# es SOLO para desarrollo: en produccion debe definirse JWT_SECRET.
security.jwt.secret-key=${JWT_SECRET:3cfa76ef14937c1c0ea519f8fc057a80fcd04a7420f8e8bcd0a7567c272e007b}
security.jwt.expiration-time=${JWT_EXPIRATION:3600000}


# CORS / WebSocket: origenes del frontend permitidos (separados por coma).
# Aplica tanto al CORS HTTP como al handshake del WebSocket STOMP.
# En produccion: CORS_ALLOWED_ORIGINS=https://tu-dominio
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173}


# GMAIL (credenciales por variable de entorno; NUNCA en el repositorio).
# Definir MAIL_USERNAME / MAIL_PASSWORD (App Password) en el entorno.
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true


# REPLICACION (Paso 7, ver db/07-replicacion)
# Por defecto DESACTIVADA: la aplicacion funciona con un unico MySQL.
# Para la demo de replicacion: REPLICA_ENABLED=true y arrancar db/07-replicacion.
app.replica.enabled=${REPLICA_ENABLED:false}
app.replica.datasource.url=${REPLICA_DB_URL:jdbc:mysql://localhost:3307/shareYourStory}
app.replica.datasource.username=${REPLICA_DB_USERNAME:app_ro}
app.replica.datasource.password=${REPLICA_DB_PASSWORD:app_ro_pwd}
