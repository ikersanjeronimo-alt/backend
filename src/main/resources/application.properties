spring.application.name=ShareYourStory

# JPA and MYSQL connection
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Datasource: credenciales externalizadas (ver db/02-usuarios-permisos.sql).
# La aplicacion usa 'app_rw' (minimo privilegio), NO 'root'.
# En produccion: definir DB_USERNAME / DB_PASSWORD por variable de entorno.
spring.datasource.url=${DB_URL:jdbc:mysql://mysql:3306/shareYourStory}
spring.datasource.username=${DB_USERNAME:app_rw}
spring.datasource.password=${DB_PASSWORD:app_rw_pwd}


# JWT
# El secreto se lee de la variable de entorno JWT_SECRET. El valor por defecto
# es SOLO para desarrollo: en produccion debe definirse JWT_SECRET.
security.jwt.secret-key=${JWT_SECRET:3cfa76ef14937c1c0ea519f8fc057a80fcd04a7420f8e8bcd0a7567c272e007b}
security.jwt.expiration-time=${JWT_EXPIRATION:3600000}


